<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexShop - Premium E-Commerce</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-logo" onclick="navigate('home', event)">NexShop.</a>
            
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search for products, brands and more...">
                <button class="search-btn"><i class="ph ph-magnifying-glass"></i></button>
            </div>

            <ul class="nav-links">
                <li><a href="#" onclick="navigate('shop', event)">Shop</a></li>
                <li><a href="#" onclick="navigate('auth', event)"><i class="ph ph-user"></i> Login</a></li>
                <li>
                    <a href="#" class="cart-icon" onclick="navigate('cart', event)">
                        <i class="ph ph-shopping-cart"></i>
                        <span class="cart-badge" id="cartBadge">0</span>
                    </a>
                </li>
                <li><button id="themeToggle" class="theme-btn"><i class="ph ph-moon"></i></button></li>
            </ul>

            <button class="mobile-menu-btn"><i class="ph ph-list"></i></button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app">
        <!-- Pages will be injected here via JS -->
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-col">
                <h3>NexShop.</h3>
                <p>The premium destination for all your shopping needs.</p>
            </div>
            <div class="footer-col">
                <h4>Quick Links</h4>
                <a href="#" onclick="navigate('home', event)">Home</a>
                <a href="#" onclick="navigate('shop', event)">Shop</a>
                <a href="#" onclick="navigate('cart', event)">Cart</a>
            </div>
            <div class="footer-col">
                <h4>Contact Us</h4>
                <p>Email: support@nexshop.com</p>
                <p>Phone: +1 234 567 8900</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 NexShop. All rights reserved.</p>
        </div>
    </footer>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- HTML Templates (for file:// protocol support without CORS) -->
    <template id="home-template">
        <div class="container">
            <section class="hero">
                <div class="hero-content">
                    <h1>Discover Premium<br>Lifestyle Products</h1>
                    <p>Upgrade your everyday experience with our curated selection of high-quality electronics, fashion, and home essentials.</p>
                    <button class="btn-primary" onclick="navigate('shop', event)">
                        Shop Now <i class="ph ph-arrow-right"></i>
                    </button>
                </div>
                <div class="hero-image">
                    <img id="hero-img" src="" alt="Featured Product">
                </div>
            </section>
            <section>
                <div class="section-header">
                    <h2>Featured Products</h2>
                    <a href="#" onclick="navigate('shop', event)" style="color: var(--primary-color); font-weight: 600;">View All</a>
                </div>
                <div class="product-grid" id="home-product-grid"></div>
            </section>
        </div>
    </template>

    <template id="shop-template">
        <div class="container">
            <div class="shop-header">
                <h2 id="shop-title">All Products</h2>
                <div>
                    <span id="shop-count" style="margin-right: 10px; color: var(--text-muted);">0 products found</span>
                    <select class="sort-select" id="shop-sort" onchange="handleSort(this.value)">
                        <option value="default">Default Sorting</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                    </select>
                </div>
            </div>
            <div class="shop-layout">
                <aside class="sidebar">
                    <div class="filter-group">
                        <h3>Categories</h3>
                        <ul class="category-list" id="category-list"></ul>
                    </div>
                </aside>
                <main id="shop-main"></main>
            </div>
        </div>
    </template>

    <template id="product-template">
        <div class="container" style="padding-top: 4rem;">
            <div class="product-detail-layout">
                <div class="product-detail-image">
                    <img id="detail-img" src="" alt="Product Image">
                </div>
                <div class="product-detail-info">
                    <p class="product-category" id="detail-category"></p>
                    <h1 id="detail-title"></h1>
                    <div class="product-rating" style="margin-bottom: 2rem; font-size: 1.2rem;" id="detail-rating"></div>
                    <div class="product-detail-price" id="detail-price"></div>
                    <p class="product-detail-desc" id="detail-desc"></p>
                    <div style="display: flex; gap: 1rem; align-items: center;">
                        <div class="quantity-selector">
                            <button class="quantity-btn" onclick="updateDetailQty(-1)">-</button>
                            <input type="number" id="detailQty" class="quantity-input" value="1" min="1">
                            <button class="quantity-btn" onclick="updateDetailQty(1)">+</button>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-primary" id="detail-add-btn">
                            <i class="ph ph-shopping-cart"></i> Add to Cart
                        </button>
                        <button class="btn-outline" style="flex: 1;" onclick="navigate('checkout')">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <template id="cart-template">
        <div class="container" style="padding-top: 4rem;">
            <h1 style="margin-bottom: 2rem;">Your Cart</h1>
            <div id="cart-content"></div>
        </div>
    </template>

    <template id="auth-template">
        <div class="container">
            <div class="auth-container">
                <div class="auth-tabs">
                    <div class="auth-tab active" id="tabLogin" onclick="switchAuthTab('login')" style="cursor:pointer;">Login</div>
                    <div class="auth-tab" id="tabRegister" onclick="switchAuthTab('register')" style="cursor:pointer;">Register</div>
                </div>
                <form id="loginForm" onsubmit="handleAuth(event, 'login')">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" id="loginEmail" required placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" id="loginPass" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary auth-btn">Sign In</button>
                </form>
                <form id="registerForm" onsubmit="handleAuth(event, 'register')" style="display: none;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" id="regName" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" id="regEmail" required placeholder="you@example.com">
                        <div class="form-error" id="regEmailErr">Invalid email format.</div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" id="regPass" required placeholder="••••••••">
                        <div class="form-error" id="regPassErr">Password must be at least 6 characters.</div>
                    </div>
                    <button type="submit" class="btn-primary auth-btn">Create Account</button>
                </form>
            </div>
        </div>
    </template>

    <template id="checkout-template">
        <div class="container" style="padding-top: 4rem;">
            <h1 style="margin-bottom: 2rem;">Checkout</h1>
            <div class="checkout-layout">
                <div class="checkout-form-section">
                    <form onsubmit="handleCheckout(event)">
                        <h3>Shipping Information</h3>
                        <div class="form-row">
                            <div class="form-group"><label>First Name</label><input type="text" class="form-control" required></div>
                            <div class="form-group"><label>Last Name</label><input type="text" class="form-control" required></div>
                        </div>
                        <div class="form-group"><label>Address</label><input type="text" class="form-control" required></div>
                        <div class="form-row">
                            <div class="form-group"><label>City</label><input type="text" class="form-control" required></div>
                            <div class="form-group"><label>Zip Code</label><input type="text" class="form-control" required></div>
                        </div>
                        <h3 style="margin-top: 2rem;">Payment Method</h3>
                        <div class="payment-methods">
                            <button type="button" class="payment-method-btn active" id="btn-card" onclick="switchPayment('card')">
                                <i class="ph ph-credit-card"></i> Card
                            </button>
                            <button type="button" class="payment-method-btn" id="btn-upi" onclick="switchPayment('upi')">
                                <i class="ph ph-device-mobile"></i> UPI
                            </button>
                            <button type="button" class="payment-method-btn" id="btn-cod" onclick="switchPayment('cod')">
                                <i class="ph ph-money"></i> COD
                            </button>
                        </div>
                        <div id="pay-card" class="payment-method-content active">
                            <div class="form-group"><label>Card Number</label><input type="text" class="form-control" placeholder="0000 0000 0000 0000" id="card-num" required></div>
                            <div class="form-row">
                                <div class="form-group"><label>Expiry Date</label><input type="text" class="form-control" placeholder="MM/YY" id="card-exp" required></div>
                                <div class="form-group"><label>CVC</label><input type="text" class="form-control" placeholder="123" id="card-cvc" required></div>
                            </div>
                        </div>
                        <div id="pay-upi" class="payment-method-content">
                            <div class="form-group"><label>UPI ID</label><input type="text" class="form-control" placeholder="username@upi" id="upi-id"></div>
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem;">You will receive a payment request on your UPI app.</p>
                        </div>
                        <div id="pay-cod" class="payment-method-content">
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; padding: 1rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); background: var(--surface-color);">
                                <i class="ph ph-info"></i> You can pay via Cash or UPI at the time of delivery.
                            </p>
                        </div>
                        <button type="submit" class="btn-primary" id="checkout-pay-btn" style="width: 100%; margin-top: 2rem; padding: 1rem; font-size: 1.1rem;">Pay</button>
                    </form>
                </div>
                <aside class="cart-summary" style="height: fit-content;">
                    <h3>Order Summary</h3>
                    <div id="checkout-cart-items" style="margin-bottom: 1.5rem; max-height: 300px; overflow-y: auto;"></div>
                    <div class="summary-row"><span>Subtotal</span><span id="checkout-subtotal"></span></div>
                    <div class="summary-row"><span>Tax</span><span id="checkout-tax"></span></div>
                    <div class="summary-total"><span>Total</span><span id="checkout-total"></span></div>
                </aside>
            </div>
        </div>
    </template>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils/ui.js"></script>
    <script src="js/components/Home.js"></script>
    <script src="js/components/Shop.js"></script>
    <script src="js/components/Product.js"></script>
    <script src="js/components/Cart.js"></script>
    <script src="js/components/Auth.js"></script>
    <script src="js/components/Checkout.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
